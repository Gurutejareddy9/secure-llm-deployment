apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: llm-system
  labels:
    app: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-lb
  namespace: llm-system
  labels:
    app: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
