apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: llm-system
  labels:
    app: llm-gateway
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: llm-gateway
          image: ghcr.io/gurutejareddy9/secure-llm-deployment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: openai-api-key
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: llm-config
                  key: redis-host
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
