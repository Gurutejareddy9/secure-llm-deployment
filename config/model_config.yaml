models:
  # Default routing target
  default_tier: "small"

  small:
    provider: "openai"
    name: "gpt-3.5-turbo"
    max_tokens: 1024
    temperature: 0.7
    cost_per_1k_input_tokens: 0.0015
    cost_per_1k_output_tokens: 0.002
    timeout_seconds: 15

  large:
    provider: "openai"
    name: "gpt-4"
    max_tokens: 4096
    temperature: 0.7
    cost_per_1k_input_tokens: 0.03
    cost_per_1k_output_tokens: 0.06
    timeout_seconds: 30

  # Local model (optional – requires transformers + GPU)
  local_small:
    provider: "local"
    name: "microsoft/phi-2"
    quantization: "4bit"
    max_tokens: 512
    device: "auto"

  local_large:
    provider: "local"
    name: "mistralai/Mistral-7B-Instruct-v0.2"
    quantization: "4bit"
    max_tokens: 2048
    device: "auto"

routing:
  # Complexity score at or above this threshold → large model
  complexity_threshold: 0.5
  long_query_chars: 500
  short_query_chars: 80

batch:
  enabled: true
  batch_size: 8
  wait_time_seconds: 0.1
  max_queue_size: 1000
